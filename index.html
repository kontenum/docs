<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontenum Knowledge Base</title>
    <link rel="stylesheet" href="https://node.kontenum.id/dist/css/main.css">
    <link rel="stylesheet" href="/assets/css/custom.css">
    <meta http-equiv="refresh" content="0;url=/en/">
    <link rel="shortcut icon" href="https://node.kontenum.id/dist/img/favicon.ico?v=20260402">
    <link rel="icon" type="image/png" href="https://node.kontenum.id/dist/img/favicon-96x96.png?v=20260402" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="https://node.kontenum.id/dist/img/favicon.svg?v=20260402">
    <link rel="apple-touch-icon" sizes="180x180" href="https://node.kontenum.id/dist/img/apple-touch-icon.png?v=20260402">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background-color: var(--tblr-body-bg);">
    <div class="container text-center">
        <div class="mb-4">
            <img src="https://node.kontenum.id/dist/img/logo.PNG" alt="Kontenum" style="height: 64px;">
        </div>
        <h1 class="mb-4">Choose Your Language / Pilih Bahasa</h1>
        <div class="row justify-content-center">
            <div class="col-md-4 col-lg-3 mb-3">
                <a href="/en/" class="card card-link card-link-pop">
                    <div class="card-body text-center">
                        <div class="display-1 mb-3">🇬🇧</div>
                        <h3 class="card-title mb-0">English</h3>
                    </div>
                </a>
            </div>
            <div class="col-md-4 col-lg-3 mb-3">
                <a href="/id/" class="card card-link card-link-pop">
                    <div class="card-body text-center">
                        <div class="display-1 mb-3">🇮🇩</div>
                        <h3 class="card-title mb-0">Bahasa Indonesia</h3>
                    </div>
                </a>
            </div>
        </div>
        <p class="text-muted mt-4">
            <small>Redirecting to English version...</small>
        </p>
    </div>
</body>
</html>
